<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background: rgb(197, 192, 192);
            display: flex;
            height: 300px;
            /* top - bottom */
            align-items: center;
            /* left - right */
            justify-content: center;
            border: 2px solid rgb(255, 6, 6);
        }
        .box{
            background: linear-gradient(purple,blue,rgb(211, 99, 99),black);
            height: 60px;
            width: 130px;
            /* left top */
            clip-path: polygon(50% 0%,0% 100%,100% 100%);
            animation-name: chg;
            animation-duration: 2s;
        }
        @keyframes chg{
            0%{
                clip-path: polygon(50% 0%,0% 100%,100% 100%);
                transform: rotateY(0deg);
            }

            50%{
                clip-path: polygon(0% 0%,0% 500%,100% 100%,100% 0%);
                border-radius: 50%;
                transform: rotateY(180deg);
            }
            100%{
                clip-path: polygon(50% 0%,0% 100%,100% 100%);
                transform: rotateY(360deg);
            }
        }
    </style>
</head>
<body>
    <div class="box"></div>
</body>
</html>
